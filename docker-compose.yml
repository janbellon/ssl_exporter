services:
  app:
    build: 
      context: .
      args: 
        HTTP_PROXY: ${http_proxy}
        HTTPS_PROXY: ${https_proxy}
        NO_PROXY: ${no_proxy}
        SSL_EXPORTER_LISTEN_HOST: 0.0.0.0
        SSL_EXPORTER_LISTEN_PORT: 9123
        SSL_EXPORTER_LISTEN_BEARER: changeme

        SSL_EXPORTER_LOG_LEVEL: info
        SSL_EXPORTER_CLIENT_TIMEOUT: 30
    ports:
      - "9123:9123"
